<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tyson Hemp — Contact</title>

<link rel="stylesheet" href="./assets/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    .menu-toggle{
display:none;
flex-direction:column;
gap:4px;
background:none;
border:none;
cursor:pointer;
}

.menu-toggle span{
width:22px;
height:2px;
background:white;
display:block;
}

.mobile-menu{
position:fixed;
top:70px;
left:0;
right:0;
background:#050807;
display:flex;
flex-direction:column;
gap:16px;
padding:30px;
transform:translateY(-120%);
transition:.35s ease;
z-index:900;
}

.mobile-menu.open{
transform:translateY(0);
}

.mobile-menu a{
color:white;
text-decoration:none;
font-size:1.1rem;
}

@media (max-width:900px){

.nav-links{
display:none;
}

.menu-toggle{
display:flex;
}

}</style>
<style>
    :root{
      --bg:#031019;
      --bg2:#071b25;
      --panel:rgba(255,255,255,.08);
      --panel-strong:rgba(255,255,255,.10);
      --stroke:rgba(255,255,255,.12);
      --text:#f4f6f8;
      --muted:rgba(255,255,255,.76);
      --green:#4b8c57;
      --green2:#98a86b;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --max:1380px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:"Montserrat",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(75,140,87,.24), transparent 26%),
        radial-gradient(circle at 85% 15%, rgba(152,168,107,.12), transparent 22%),
        linear-gradient(180deg, #02070b 0%, #04111a 38%, #071b25 100%);
      min-height:100vh;
      padding-top:92px;
      overflow-x:hidden;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    /* NAVBAR */
    .nav-wrap{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:1000;
      background:rgba(8,15,22,.82);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .nav{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 24px;
      min-height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      position:relative;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      flex-shrink:0;
    }

    .brand-mark{
      width:54px;
      height:54px;
      border-radius:18px;
      display:grid;
      place-items:center;
      font-weight:800;
      font-size:1.1rem;
      color:#fff;
      background:linear-gradient(135deg, var(--green), var(--green2));
      box-shadow:0 10px 28px rgba(0,0,0,.22);
    }

    .brand-text{
      line-height:1.05;
    }

    .brand-name{
      display:block;
      font-family:"Playfair Display",serif;
      font-size:1.15rem;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .brand-sub{
      display:block;
      margin-top:4px;
      font-size:.82rem;
      color:rgba(255,255,255,.74);
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .nav-links a{
      padding:12px 16px;
      border-radius:999px;
      font-size:.95rem;
      color:#fff;
      transition:.2s ease;
    }

    .nav-links a:hover{
      background:rgba(255,255,255,.08);
    }

    .nav-links a.active-link{
      background:linear-gradient(135deg, var(--green), var(--green2));
      font-weight:700;
    }

    .nav-toggle{
      display:none;
      width:42px;
      height:42px;
      min-width:42px;
      min-height:42px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      cursor:pointer;
      padding:0;
      flex-shrink:0;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:4px;
    }

    .nav-toggle span{
      display:block;
      width:20px;
      height:2px;
      border-radius:999px;
      background:#fff;
      transition:.25s ease;
    }

    .nav-toggle.active span:nth-child(1){
      transform:translateY(6px) rotate(45deg);
    }

    .nav-toggle.active span:nth-child(2){
      opacity:0;
    }

    .nav-toggle.active span:nth-child(3){
      transform:translateY(-6px) rotate(-45deg);
    }

    /* PAGE */
    .page{
      max-width:var(--max);
      margin:0 auto;
      padding:36px 24px 60px;
    }

    .hero{
      margin-bottom:24px;
    }

    .eyebrow{
      display:inline-block;
      margin-bottom:14px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:rgba(255,255,255,.82);
      font-size:.82rem;
      font-weight:700;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .hero h1{
      font-family:"Playfair Display",serif;
      font-size:clamp(2rem, 5vw, 4rem);
      line-height:1.05;
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:12px;
    }

    .hero p{
      max-width:760px;
      color:var(--muted);
      font-size:1rem;
      line-height:1.75;
    }

    .glass-box{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      padding:30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05)),
        rgba(255,255,255,.03);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .glass-box::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top right, rgba(152,168,107,.12), transparent 28%),
        radial-gradient(circle at bottom left, rgba(75,140,87,.12), transparent 30%);
      pointer-events:none;
    }

    .disclaimer-content{
      position:relative;
      z-index:1;
    }

    .disclaimer-content h2{
      font-size:clamp(1.3rem, 3vw, 2rem);
      margin-bottom:16px;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:800;
    }

    .disclaimer-content p{
      color:var(--muted);
      font-size:1rem;
      line-height:1.9;
      margin-bottom:18px;
    }

    .disclaimer-content p:last-child{
      margin-bottom:0;
    }

    /* MOBILE */
    @media (max-width: 900px){
      body{
        padding-top:82px;
      }

      .nav{
        padding:14px 16px;
      }

      .nav-toggle{
        display:flex;
      }

      .nav-links{
        display:none;
        position:absolute;
        top:100%;
        left:16px;
        right:16px;
        margin-top:12px;
        padding:14px;
        border-radius:20px;
        background:rgba(8,15,22,.98);
        border:1px solid rgba(255,255,255,.08);
        box-shadow:0 18px 40px rgba(0,0,0,.35);
        flex-direction:column;
        align-items:stretch;
        gap:8px;
      }

      .nav-links.show{
        display:flex;
      }

      .nav-links a{
        width:100%;
        padding:14px 16px;
        border-radius:14px;
      }

      .page{
        padding:24px 16px 44px;
      }

      .glass-box{
        padding:22px 18px;
        border-radius:24px;
      }
    }

    @media (max-width: 640px){
      .brand-mark{
        width:48px;
        height:48px;
        border-radius:16px;
      }

      .brand-name{
        font-size:1rem;
      }

      .brand-sub{
        font-size:.74rem;
      }

      .hero h1{
        margin-bottom:10px;
      }

      .hero p,
      .disclaimer-content p{
        font-size:.95rem;
        line-height:1.8;
      }

      .disclaimer-content h2{
        margin-bottom:12px;
      }
    }
  </style>
</head>

<body>
  <header class="nav-wrap">
    <nav class="nav">
      <a class="brand" href="index.html">
        <span class="brand-mark">TY</span>
        <span class="brand-text">
          <span class="brand-name">Tyson Hemp</span>
          <span class="brand-sub">Lab Reports</span>
        </span>
      </a>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" id="navMenu">
        <a href="coas.html">COAs</a>
        <a href="disclaimer.html" class="active-link">Disclaimer</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>


<!-- CONTACT SECTION -->
<section class="contact-section">

<div class="contact-wrapper glass">

<h1 class="contact-title">Contact Tyson Hemp</h1>

<form class="contact-form">

<div class="form-group">
<label>Name</label>
<input type="text" placeholder="Your Name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Your Email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" placeholder="Your Phone Number">
</div>

<div class="form-group">
<label>Message</label>
<textarea rows="5" placeholder="Send your message"></textarea>
</div>

<button type="submit" class="btn submit-btn">
Send Message
</button>

</form>

</div>

</section>

<script>
    const menuToggle = document.querySelector(".menu-toggle");
const mobileMenu = document.querySelector(".mobile-menu");

if(menuToggle){
menuToggle.addEventListener("click",()=>{
mobileMenu.classList.toggle("open");
menuToggle.classList.toggle("open");
});
}
</script>
  <script>
    const navToggle = document.getElementById("navToggle");
    const navMenu = document.getElementById("navMenu");

    navToggle.addEventListener("click", () => {
      navMenu.classList.toggle("show");
      navToggle.classList.toggle("active");
    });
  </script>
</body>
</html>
