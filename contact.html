<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tyson Hemp — Contact</title>

<link rel="stylesheet" href="./assets/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    .menu-toggle{
display:none;
flex-direction:column;
gap:4px;
background:none;
border:none;
cursor:pointer;
}

.menu-toggle span{
width:22px;
height:2px;
background:white;
display:block;
}

.mobile-menu{
position:fixed;
top:70px;
left:0;
right:0;
background:#050807;
display:flex;
flex-direction:column;
gap:16px;
padding:30px;
transform:translateY(-120%);
transition:.35s ease;
z-index:900;
}

.mobile-menu.open{
transform:translateY(0);
}

.mobile-menu a{
color:white;
text-decoration:none;
font-size:1.1rem;
}

@media (max-width:900px){

.nav-links{
display:none;
}

.menu-toggle{
display:flex;
}

}</style>
</head>

<body>

<header class="nav-wrap">

<nav class="nav">

<div class="brand">
<div class="brand-logo">TY</div>

<div class="brand-text">
<div class="brand-name">TYSON HEMP</div>
<div class="brand-sub">Premium THC-A</div>
</div>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="coas.html">COAs</a></li>
<li><a href="disclaimer.html">Disclaimer</a></li>
<li><a href="contact.html" class="nav-cta">Contact</a></li>
</ul>

<!-- MOBILE MENU BUTTON -->
<button class="menu-toggle" aria-label="Menu">
<span></span>
<span></span>
<span></span>
</button>

</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu">

<a href="index.html">Home</a>
<a href="coas.html">COAs</a>
<a href="disclaimer.html">Disclaimer</a>
<a href="contact.html">Contact</a>

</div>

</header>


<!-- CONTACT SECTION -->
<section class="contact-section">

<div class="contact-wrapper glass">

<h1 class="contact-title">Contact Tyson Hemp</h1>

<form class="contact-form">

<div class="form-group">
<label>Name</label>
<input type="text" placeholder="Your Name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Your Email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" placeholder="Your Phone Number">
</div>

<div class="form-group">
<label>Message</label>
<textarea rows="5" placeholder="Send your message"></textarea>
</div>

<button type="submit" class="btn submit-btn">
Send Message
</button>

</form>

</div>

</section>

<script>
    const menuToggle = document.querySelector(".menu-toggle");
const mobileMenu = document.querySelector(".mobile-menu");

if(menuToggle){
menuToggle.addEventListener("click",()=>{
mobileMenu.classList.toggle("open");
menuToggle.classList.toggle("open");
});
}
</script>
</body>
</html>
